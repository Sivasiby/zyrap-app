<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Zyrap - Bus Ticket Booking App">
    <title>Opening Zyrap App...</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #00b7f3 0%, #0077b3 100%);
            color: white;
            text-align: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            max-width: 420px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .logo {
            width: 76px;
            height: 76px;
            margin: 0 auto 18px;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
        }

        h1 { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
        .subtitle { font-size: 15px; opacity: 0.88; margin-bottom: 28px; }

        /* ── Loading state ── */
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            width: 56px; height: 56px;
            animation: spin 0.9s linear infinite;
            margin: 16px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .status-text {
            font-size: 14px;
            opacity: 0.82;
            margin: 16px 0;
            min-height: 20px;
            transition: opacity 0.3s;
        }

        /* ── Download state ── */
        #downloadSection { display: none; }

        .store-button {
            display: inline-block;
            margin-top: 18px;
            padding: 15px 30px;
            background: white;
            color: #007aad;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 14px rgba(0,0,0,0.18);
        }
        .store-button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.25); }
        .store-button:active { transform: translateY(0); }

        .features {
            margin-top: 24px;
            text-align: left;
            background: rgba(255,255,255,0.1);
            padding: 18px;
            border-radius: 12px;
        }
        .feature-item {
            display: flex;
            align-items: center;
            margin-bottom: 11px;
            font-size: 14px;
        }
        .feature-item:last-child { margin-bottom: 0; }
        .feature-icon { margin-right: 10px; font-size: 18px; }

        @media (max-width: 480px) {
            .container { padding: 28px 18px; }
            h1 { font-size: 22px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">🚌</div>
    <h1>Opening Zyrap</h1>
    <p class="subtitle">Bus Ticket Booking Made Easy</p>

    <!-- State 1: trying to open app -->
    <div id="loadingSection">
        <div class="spinner"></div>
        <p class="status-text" id="statusText">Launching app…</p>
    </div>

    <!-- State 2: app not installed -->
    <div id="downloadSection">
        <p class="status-text">Zyrap isn't installed on your device.</p>
        <a id="playStoreLink"
           href="https://play.google.com/store/apps/details?id=com.zyrap"
           class="store-button">
            📥 Get it on Play Store
        </a>
        <div class="features">
            <div class="feature-item"><span class="feature-icon">✅</span><span>Quick &amp; Easy Ticket Booking</span></div>
            <div class="feature-item"><span class="feature-icon">💳</span><span>Secure Online Payments</span></div>
            <div class="feature-item"><span class="feature-icon">🎫</span><span>Digital Tickets</span></div>
            <div class="feature-item"><span class="feature-icon">⚡</span><span>Real-time Bus Tracking</span></div>
        </div>
    </div>
</div>

<script>
    const PACKAGE   = 'com.zyrap';
    const SCHEME    = 'zyrap';
    const STORE_URL = 'https://play.google.com/store/apps/details?id=' + PACKAGE;
    const TIMEOUT   = 2200;   // ms to wait before assuming app isn't installed

    // ── Read ?data= from URL ──────────────────────────────────────────────
    const data = new URLSearchParams(window.location.search).get('data') || '';

    // ── Build URLs ────────────────────────────────────────────────────────
    // 1. Android Intent URL — the RELIABLE way to open an app on Android.
    //    If the app is not installed, Android fires the fallback (Play Store).
    //    Format: intent://<host>/<path>#Intent;scheme=<scheme>;package=<pkg>;S.browser_fallback_url=<url>;end
    const intentUrl = [
        'intent://new-ticket',
        data ? '?data=' + encodeURIComponent(data) : '',
        '#Intent',
        ';scheme=' + SCHEME,
        ';package=' + PACKAGE,
        ';S.browser_fallback_url=' + encodeURIComponent(STORE_URL),
        ';end'
    ].join('');

    // 2. Plain custom scheme — works on iOS and as a secondary try on Android.
    const schemeUrl = SCHEME + '://new-ticket' + (data ? '?data=' + encodeURIComponent(data) : '');

    // ── UI helpers ────────────────────────────────────────────────────────
    function setStatus(msg) {
        document.getElementById('statusText').textContent = msg;
    }

    function showDownload() {
        document.getElementById('loadingSection').style.display = 'none';
        document.getElementById('downloadSection').style.display = 'block';
    }

    // ── Launch logic ──────────────────────────────────────────────────────
    const isAndroid = /android/i.test(navigator.userAgent);
    const isIOS     = /iphone|ipad|ipod/i.test(navigator.userAgent);

    let appLaunched = false;

    // Hide the page when the user leaves → app opened
    document.addEventListener('visibilitychange', function () {
        if (document.hidden) appLaunched = true;
    });
    window.addEventListener('blur', function () {
        appLaunched = true;
    });
    window.addEventListener('pagehide', function () {
        appLaunched = true;
    });

    function launch() {
        if (isAndroid) {
            // Intent URL hands off to Android's package manager.
            // If installed → opens app. If not → Android itself redirects to Play Store.
            // We still keep a JS timeout as a belt-and-suspenders fallback.
            setStatus('Launching app…');
            window.location.href = intentUrl;

        } else if (isIOS) {
            // iOS: try custom scheme, fall back to App Store after timeout
            setStatus('Launching app…');
            window.location.href = schemeUrl;

        } else {
            // Desktop / unknown — just show the Play Store link
            showDownload();
            return;
        }

        // If the page is still visible after TIMEOUT ms, the app didn't open
        setTimeout(function () {
            if (!appLaunched && !document.hidden) {
                setStatus('App not found — redirecting…');
                showDownload();
                // Also auto-redirect to Play Store after a short delay
                setTimeout(function () {
                    if (!appLaunched && !document.hidden) {
                        window.location.href = STORE_URL;
                    }
                }, 1500);
            }
        }, TIMEOUT);
    }

    // Small delay so the spinner is visible for a moment
    setTimeout(launch, 400);
</script>
</body>
</html>
